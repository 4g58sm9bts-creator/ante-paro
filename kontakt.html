<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Kontakt - Ante Paro</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Kontakt forma (lokalni stilovi) */
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #aaa;
            background: var(--card);
            color: var(--text);
            font-size: 16px;
            margin-bottom: 14px;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

<!-- NAVIGATION -->
<nav>

    </div>
<div class="container">

    <div class="card fade-in">
        <h2>Kontakt</h2>
        <p>Za suradnje, nogometne projekte ili komunikaciju vezanu uz igrača, ispunite formu ispod:</p>

        <form>
            <input type="text" placeholder="Ime i prezime" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Vaša poruka..." rows="5" required></textarea>
            <button>Pošalji</button>
        </form>
    </div>

</div>

<footer>© 2025 Ante Paro • NK Pag</footer>
